<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050816" />
    <title>Galactic Forum</title>
    <link rel="manifest" href="manifest.webmanifest?v=12" />
    <link rel="stylesheet" href="styles.css?v=12" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Holonet Community</p>
          <h1>Galactic Forum</h1>
          <p class="subtitle">Nachrichten aus allen Sektoren</p>
        </div>
        <button class="icon-button" id="profileButton" aria-label="Profil bearbeiten" title="Profil">
          <span id="profileInitial">D</span>
        </button>
      </header>

      <main class="content">
        <nav class="unit-tabs" id="unitTabs" aria-label="Einheiten"></nav>
        <section class="access-panel" id="accessPanel" aria-live="polite"></section>

        <section class="search-row" aria-label="Forum durchsuchen">
          <input id="searchInput" type="search" placeholder="Transmissionen, Antworten, Tags suchen" autocomplete="off" />
          <button class="primary-icon-button" id="newThreadButton" aria-label="Neue Transmission" title="Neue Transmission">+</button>
        </section>

        <nav class="category-tabs" id="categoryTabs" aria-label="Kategorien"></nav>

        <section class="stats-strip" aria-label="Forum Statistik">
          <div>
            <strong id="threadCount">0</strong>
            <span>Themen</span>
          </div>
          <div>
            <strong id="replyCount">0</strong>
            <span>Antworten</span>
          </div>
          <div>
            <strong id="activeCategory">Alle</strong>
            <span>Filter</span>
          </div>
        </section>

        <section class="members-panel" id="membersPanel" aria-label="Mitgliederverwaltung"></section>
        <section class="chat-panel" id="chatPanel" aria-label="Einheitschat"></section>

        <section class="thread-list" id="threadList" aria-label="Themen"></section>
      </main>

      <nav class="bottom-nav" aria-label="Hauptnavigation">
        <button class="nav-item active" data-view="home" aria-label="Holonet">
          <span>H</span>
          <small>Holonet</small>
        </button>
        <button class="nav-item" data-view="popular" aria-label="Beliebt">
          <span>*</span>
          <small>Beliebt</small>
        </button>
        <button class="nav-item" data-view="saved" aria-label="Gespeichert">
          <span>+</span>
          <small>Merken</small>
        </button>
      </nav>
    </div>

    <dialog id="threadDialog">
      <form method="dialog" class="dialog-card" id="threadForm">
        <header>
          <h2>Neue Transmission</h2>
          <button class="ghost-icon-button" value="cancel" aria-label="Schliessen">x</button>
        </header>
        <label>
          Titel
          <input id="threadTitle" required maxlength="80" placeholder="Worum geht es?" />
        </label>
        <label>
          Kategorie
          <select id="threadCategory" required></select>
        </label>
        <label>
          Nachricht
          <textarea id="threadBody" required maxlength="700" rows="6" placeholder="Schreibe deine Nachricht an den Sektor"></textarea>
        </label>
        <label>
          Tags
          <input id="threadTags" maxlength="80" placeholder="z.B. hilfe, mission, frage" />
        </label>
        <button class="primary-button" type="submit">Senden</button>
      </form>
    </dialog>

    <dialog id="detailDialog">
      <article class="dialog-card detail-card">
        <header>
          <button class="ghost-icon-button" id="backButton" aria-label="Zurueck">&lt;</button>
          <h2 id="detailTitle">Thema</h2>
          <button class="ghost-icon-button" id="saveThreadButton" aria-label="Thema merken">+</button>
        </header>
        <div class="thread-detail-meta" id="detailMeta"></div>
        <p class="detail-body" id="detailBody"></p>
        <div class="reply-stack" id="replyStack"></div>
        <form class="reply-form" id="replyForm">
          <textarea id="replyBody" required rows="3" maxlength="400" placeholder="Antwort schreiben"></textarea>
          <button class="primary-button" type="submit">Antworten</button>
        </form>
      </article>
    </dialog>

    <dialog id="profileDialog">
      <form method="dialog" class="dialog-card" id="profileForm">
        <header>
          <h2>Profil</h2>
          <button class="ghost-icon-button" value="cancel" aria-label="Schliessen">x</button>
        </header>
        <label>
          Anzeigename
          <input id="displayName" required maxlength="32" />
        </label>
        <label>
          Rolle oder Interesse
          <input id="profileBio" maxlength="64" placeholder="z.B. Pilot, Moderator, Techniker" />
        </label>
        <button class="primary-button" type="submit">Speichern</button>
      </form>
    </dialog>

    <dialog id="accessDialog">
      <form method="dialog" class="dialog-card" id="accessForm">
        <header>
          <h2 id="accessTitle">Registerpruefung</h2>
          <button class="ghost-icon-button" value="cancel" aria-label="Schliessen">x</button>
        </header>
        <p class="security-copy" id="accessCopy"></p>
        <label>
          Rufname
          <input id="accessCallsign" required maxlength="32" placeholder="z.B. CT Stone" />
        </label>
        <label>
          Register-ID
          <input id="accessCode" required maxlength="24" placeholder="Einheitskennung" />
        </label>
        <p class="access-error" id="accessError"></p>
        <button class="primary-button" type="submit">Zugriff pruefen</button>
      </form>
    </dialog>

    <dialog id="memberDialog">
      <form method="dialog" class="dialog-card" id="memberForm">
        <header>
          <h2>Neue Personalakte</h2>
          <button class="ghost-icon-button" value="cancel" aria-label="Schliessen">x</button>
        </header>
        <label>
          Rufname
          <input id="memberName" required maxlength="32" placeholder="z.B. CT-7567 Rex" />
        </label>
        <label>
          Dienstnummer
          <input id="memberSerial" required maxlength="24" placeholder="z.B. CT-7567" />
        </label>
        <label>
          Start-Rang
          <select id="memberRank" required></select>
        </label>
        <button class="primary-button" type="submit">Akte anlegen</button>
      </form>
    </dialog>

    <script>
      if ("caches" in window) {
        caches.keys().then((keys) => keys.forEach((key) => {
          if (key.startsWith("forum-mobile-")) caches.delete(key);
        }));
      }
    </script>
    <script src="app.js?v=12"></script>
  </body>
</html>
